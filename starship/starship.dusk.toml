"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ÓÇ∂](color_slate)\
$os\
$username\
$hostname\
[ÓÇº](bg:color_amber fg:color_slate)\
$directory\
[ÓÇº](fg:color_amber bg:color_sage)\
$git_branch\
$git_status\
[ÓÇº](fg:color_sage bg:color_twilight)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[ÓÇº](fg:color_twilight bg:color_muted_dusk)\
$docker_context\
$conda\
$pixi\
$kubernetes\
$terraform\
$aws\
$azure\
$gcloud\
[ÓÇº](fg:color_muted_dusk bg:color_deep_dusk)\
$time\
[ÓÇ¥ ](fg:color_deep_dusk)\
$cmd_duration\
$status\
